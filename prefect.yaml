# prefect.yaml
name: 311-ny-service-requests
prefect-version: 3.0.0

pull:

deployments:
  - name: extract-load-deployment
    entrypoint: main.py:extract_load_flow
    work_pool:
      name: docker-gcp-pool
    parameters:
      year: 2024
      month: 1
    run_name: "NYC 311 ETL {year}-{month:02d}"

  - name: annual-backfill-deployment
    entrypoint: main.py:backfill_year_flow
    work_pool:
      name: docker-gcp-pool
    parameters:
      year: 2024
    run_name: "NYC 311 Backfill {year}"