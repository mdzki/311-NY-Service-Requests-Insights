dbt_transform:
  outputs:
    dev:
      dataset: NY_311_SERVICE_REQUESTS_DATASET
      job_execution_timeout_seconds: 300
      job_retries: 1
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"      
      location: EU
      method: oauth
      priority: interactive
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      threads: 1
      type: bigquery
  target: dev