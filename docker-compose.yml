services:
  database:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=prefect
      - POSTGRES_PASSWORD=prefect
      - POSTGRES_DB=prefect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: prefecthq/prefect:3-python3.13
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "4200:4200"
    environment:
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@database:5432/prefect
      - PREFECT_SERVER_API_HOST=0.0.0.0
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health').getcode()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    command: ["prefect", "server", "start"]

  deployer:
    build: .
    env_file: .env
    depends_on:
      server:
        condition: service_healthy
    environment:
      - PREFECT_API_URL=http://server:4200/api
      - GOOGLE_APPLICATION_CREDENTIALS=/app/creds_json/gcp_key.json
      - UV_LINK_MODE=copy
    volumes:
      - .:/app
      - /app/.venv
      - ./creds_json/gcp_key.json:/app/creds_json/gcp_key.json:ro
    command: >
      sh -c "until uv run python -c 'import urllib.request; urllib.request.urlopen(\"http://server:4200/api/health\")'; do 
               echo 'Waiting for Prefect API...'; 
               sleep 2; 
             done; 
             uv run dbt deps --project-dir dbt_transform --profiles-dir dbt_transform && 
             uv run prefect work-pool create 'docker-gcp-pool' --type process --overwrite &&
             uv run prefect deploy --all"

  worker:
    build: .
    env_file: .env
    depends_on:
      server:
        condition: service_healthy
      deployer:
        condition: service_completed_successfully
    environment:
      - PREFECT_API_URL=http://server:4200/api
      - GOOGLE_APPLICATION_CREDENTIALS=/app/creds_json/gcp_key.json
      - UV_LINK_MODE=copy
    volumes:
      - .:/app
      - /app/.venv
      - ./creds_json/gcp_key.json:/app/creds_json/gcp_key.json:ro
      - ./data:/app/data
    command: uv run prefect worker start --pool docker-gcp-pool

  dashboard:
    build: .
    env_file: .env
    depends_on:
      worker:
        condition: service_started
    ports:
      - "8501:8501"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/creds_json/gcp_key.json
      - UV_LINK_MODE=copy
    volumes:
      - .:/app
      - /app/.venv
      - ./creds_json/gcp_key.json:/app/creds_json/gcp_key.json:ro
    command: uv run streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0